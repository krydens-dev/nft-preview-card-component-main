<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | NFT preview card component</title>
  <link rel="stylesheet" href="design/styles.css">
</head>
<body>
  <main>
    <div class="product-card">
      <div class="image-wrapper">
        <img class="product-image" src="images/image-equilibrium.jpg" alt="NFT product image">
        <div class="overlay"></div>
        <img class="view-icon" src="images/icon-view.svg" alt="icon view">
      </div>
      <h1 class="product-title hoverable">Equilibrium #3429</h1>
      <p class="product-description">Our Equilibrium collection promotes balance and calm.</p>
      <div class="content-wrapper">
        <div class="flex-center">
          <img src="images/icon-ethereum.svg" alt="">
          <p class="price">0.041 ETH</p>
        </div>
        <div class="flex-center">
          <img src="images/icon-clock.svg" alt="">
          <p class="time-left">3 days left</p>
        </div>
      </div>
      <hr class="divider">
      <div class="user-section">
        <img class="user-avatar" src="images/image-avatar.png" alt="">
        <p class="user-meta">Creation of <span class="user-name hoverable">Jules Wyvern</span></p>
      </div>
    </div>
  </main>
</body>
</html>
